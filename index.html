        function getResponse(query) {
            let imageMatch = null;
            let imageScore = 0;

            for (const [category, data] of Object.entries(imageKnowledgeBase)) {
                for (const keyword of data.keywords) {
                    if (query.includes(keyword)) {
                        const score = keyword.length;
                        if (score > imageScore) {
                            imageScore = score;
                            imageMatch = category;
                        }
                    }
                }
            }

            if (imageMatch) {
                const data = imageKnowledgeBase[imageMatch];
                if (data.images && data.images.length > 0) {
                    const randomImage = data.images[Math.floor(Math.random() * data.images.length)];
                    return {
                        type: 'image',
                        data: { ...data, image: randomImage }
                    };
                }
                return {
                    type: 'image',
                    data: data
                };
            }

            let bestMatch = null;
            let bestScore = 0;

            for (const [category, data] of Object.entries(knowledgeBase)) {
                for (const keyword of data.keywords) {
                    if (query.includes(keyword)) {
                        const score = keyword.length;
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = category;
                        }
                    }
                }
            }

            if (bestMatch) {
                const responses = knowledgeBase[bestMatch].responses;
                for (const [key, response] of Object.entries(responses)) {
                    if (key !== 'default' && query.includes(key)) {
                        return response;
                    }
                }
                return responses.default;
            }

            return {
                type: 'image',
                data: {
                    image: '7a8b4c14d3ad817e31edda228489aca1.jpg',
                    description: '抱歉，这个问题我暂时无法回答。您可以扫描上方二维码添加学长微信，学长会为您解答更多问题！'
                }
            };
        }

        function sendMessage(text) {
            const inputField = document.getElementById('inputField');
            const messageText = text || inputField.value.trim();
            
            if (!messageText) return;

            inputField.value = '';
            addMessage(messageText, 'user');
            showTyping();

            setTimeout(() => {
                removeTyping();
                const response = getResponse(messageText);
                if (typeof response === 'object' && response.type === 'image') {
                    addImageMessage(response.data, 'bot');
                } else {
                    addMessage(response, 'bot');
                }
            }, 800 + Math.random() * 700);
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(text, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            const avatar = type === 'user' ? '👤' : '🎓';
            const avatarColor = type === 'user' ? '#3b82f6' : 'linear-gradient(135deg, #1a365d 0%, #2c5282 100%)';
            
            messageDiv.innerHTML = `
                <div class="message-avatar" style="background: ${avatarColor}">${avatar}</div>
                <div class="message-content">${formatText(text)}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function addImageMessage(data, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            const avatar = type === 'user' ? '👤' : '🎓';
            const avatarColor = type === 'user' ? '#3b82f6' : 'linear-gradient(135deg, #1a365d 0%, #2c5282 100%)';
            
            messageDiv.innerHTML = `
                <div class="message-avatar" style="background: ${avatarColor}">${avatar}</div>
                <div class="message-content">
                    <div class="message-image-container">
                        <img src="${data.image}" alt="${data.description}" class="message-image">
                        <div class="message-image-caption">${data.description}</div>
                    </div>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function formatText(text) {
            return text;
        }

        function showTyping() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message message-bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar" style="background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%)">🎓</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function scrollToBottom() {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
